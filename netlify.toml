[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10.8.2"

[[redirects]]
  from = "/api/search"
  to = "/.netlify/functions/search"
  status = 200

[[redirects]]
  from = "/api/admin"
  to = "/.netlify/functions/admin"
  status = 200


[[redirects]]
  from = "/api/ai-outreach"
  to = "/.netlify/functions/ai-outreach"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200